<!DOCTYPE html>
<html>
  
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<title>la colore clock =)</title>
</head>
  
<body style="text-align:center; font-family:sans-serif;">
   <img src="https://raw.githubusercontent.com/apgrdn/clck/main/colorebox-glove.jpeg" style="width:150px; margin: top 4px; margin-bottom:10px;">
<h2 style="font-size:40px; margin-bottom:5px;">ColoreClox</h2>
<h3 style="font-weight:normal; color:gray;margin-top:-5px;">
  Rappelle-moi, l'artiste, tu t'appelles comment déjà ?
</h3>
<input id="name" placeholder="type it in, soldier" style="font-size:20px; padding:10px; width:80%;" />
<br><br>
<button onclick="send('IN')" style="font-size:24px; padding:20px; width:80%; margin:10px;">IN</button>
<button onclick="send('OUT')" style="font-size:24px; padding:20px; width:80%; margin:10px;">OUT</button>
  
<script>
const URL = "https://script.google.com/macros/s/AKfycbzXEz1WlCGRx2L6GZ42_NKBzgzEo5887Vzd-a47_CdKdMYbGT3nl5qBG2oKrel1aryz/exec";

function send(action) {
const name = document.getElementById("name").value;

fetch(URL, {
method: "POST",
body: JSON.stringify({
name: name,
action: action,
secret: "moncode123"
})
})
.then(res => res.text())
.then(text => alert(text))
.catch(err => alert("Erreur: " + err));
}
</script>

</body>
</html>
