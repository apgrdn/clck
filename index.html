<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<title>la colore clock =)</title>
</head>
<body>

<h2>Rappelle-moi, l'artiste, tu t'appelles comment déjà ?</h2>

<input id="name" placeholder="Nom" />

<br><br>

<button onclick="send('IN')">IN</button>
<button onclick="send('OUT')">OUT</button>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzXEz1WlCGRx2L6GZ42_NKBzgzEo5887Vzd-a47_CdKdMYbGT3nl5qBG2oKrel1aryz/exec";

function send(action) {
const name = document.getElementById("name").value;

fetch(URL, {
method: "POST",
body: JSON.stringify({
name: name,
action: action,
secret: "moncode123"
})
})
.then(res => res.text())
.then(text => alert(text))
.catch(err => alert("Erreur: " + err));
}
</script>

</body>
</html>
